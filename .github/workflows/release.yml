name: DuckyClaw Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GITEE_REPO: tuya-open/DuckyClaw

jobs:
  sync-gitee:
    if: github.repository == 'tuya/DuckyClaw'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "Github Action"
          git config --global user.email "action@github.com"

      - name: Add Gitee remote
        run: |
          if [ -z "${{ secrets.GITEE_TOKEN }}" ]; then
            echo "GITEE_TOKEN is not configured"
            exit 1
          fi
          git remote add gitee https://flyingcys:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ env.GITEE_REPO }}.git

      - name: Push tag to Gitee
        run: git push gitee --tags --force

  build-firmware:
    runs-on: ubuntu-latest
    env:
      OPEN_COUNTRY_CODE: "NONE"
      BUILD_LOG_BASE: ${{ github.workspace }}/tmp/logs/build_logs_${{ github.run_number }}
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          show-progress: false
          submodules: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            wget git lcov cmake ninja-build \
            build-essential \
            python3 python3-pip python3-venv \
            libc6-i386 libsystemd-dev

      - name: Check base tools
        run: |
          cd ${{ github.workspace }}/TuyaOpen
          . ./export.sh
          cd ${{ github.workspace }}
          tos.py version
          rm -rf ${{ github.workspace }}/dist ${{ github.workspace }}/release-assets

      - name: Build Linux board configs
        env:
          BUILD_LOG_DIR: ${{ env.BUILD_LOG_BASE }}/linux_configs
        run: |
          cd ${{ github.workspace }}/TuyaOpen
          . ./export.sh
          mkdir -p .cache && touch .cache/.dont_prompt_update_platform
          cd ${{ github.workspace }}
          for cfg in config/Ubuntu.config config/RaspberryPi.config config/DshanPi_A1.config; do
            cp "$cfg" app_default.config
            tos.py build || exit 1
          done

      - name: Prepare release assets
        run: |
          mkdir -p ${{ github.workspace }}/release-assets
          find ${{ github.workspace }}/dist -type f \( -name '*.elf' -o -name 'DuckyClaw*' -perm -111 \) -exec cp {} ${{ github.workspace }}/release-assets/ \; 2>/dev/null || true
          cd ${{ github.workspace }}/release-assets
          if ls * 1>/dev/null 2>&1; then sha256sum * > SHA256SUMS.txt; else echo "No release binaries found" && exit 1; fi

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: ${{ github.workspace }}/release-assets/*
          if-no-files-found: error
          retention-days: 90

      - name: Set timestamp
        id: timestamp
        if: always()
        run: echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build_logs_${{ github.run_number }}_${{ steps.timestamp.outputs.timestamp }}
          path: ${{ env.BUILD_LOG_BASE }}
          retention-days: 90
          if-no-files-found: warn

  github-release:
    runs-on: ubuntu-latest
    needs: build-firmware
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: artifacts/release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release-assets/*
          overwrite_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gitee-release:
    if: github.repository == 'tuya/DuckyClaw'
    runs-on: ubuntu-latest
    needs:
      - sync-gitee
      - build-firmware
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: artifacts/release-assets

      - name: Create Gitee release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          TARGET_COMMITISH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [ -z "${GITEE_TOKEN}" ]; then
            echo "GITEE_TOKEN is not configured"
            exit 1
          fi

          API_BASE="https://gitee.com/api/v5/repos/${GITEE_REPO}"

          RELEASE_ID="$(
            curl -fsSL \
              -H "Authorization: token ${GITEE_TOKEN}" \
              "${API_BASE}/releases" | python3 -c 'import json, sys
          tag_name = sys.argv[1]
          for release in json.load(sys.stdin):
              if release.get("tag_name") == tag_name:
                  release_id = release.get("id")
                  if release_id is not None:
                      print(release_id)
                  break
          ' "${TAG_NAME}"
          )"

          if [ -z "${RELEASE_ID}" ]; then
            RELEASE_PAYLOAD="$(
              python3 -c 'import json, os
          print(json.dumps({
              "tag_name": os.environ["TAG_NAME"],
              "target_commitish": os.environ["TARGET_COMMITISH"],
              "name": "Release " + os.environ["TAG_NAME"],
              "body": "See release notes at https://github.com/tuya/DuckyClaw/releases/tag/" + os.environ["TAG_NAME"],
              "draft": False,
              "prerelease": False,
          }))'
            )"

            RELEASE_ID="$(
              curl -fsSL -X POST "${API_BASE}/releases" \
                -H "Content-Type: application/json" \
                -H "Authorization: token ${GITEE_TOKEN}" \
                -d "${RELEASE_PAYLOAD}" | python3 -c 'import json, sys
          data = json.load(sys.stdin)
          release_id = data.get("id")
          if release_id is None:
              raise SystemExit(json.dumps(data))
          print(release_id)
          '
            )"
          fi

          for file_path in artifacts/release-assets/*; do
            [ -f "${file_path}" ] || continue
            curl -fsSL -X POST "${API_BASE}/releases/${RELEASE_ID}/attach_files" \
              -H "Authorization: token ${GITEE_TOKEN}" \
              -F "file=@${file_path}"
          done
